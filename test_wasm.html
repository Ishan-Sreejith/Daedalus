<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoRe Language WebAssembly Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background: #1e1e1e;
            color: #fff;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        textarea {
            width: 100%;
            height: 200px;
            background: #2d2d2d;
            color: #fff;
            border: 1px solid #555;
            padding: 10px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
        }
        button {
            background: #007acc;
            color: white;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            margin: 10px 5px 0 0;
            border-radius: 4px;
        }
        button:hover {
            background: #005a9f;
        }
        .output {
            background: #2d2d2d;
            padding: 10px;
            margin-top: 10px;
            border-left: 4px solid #007acc;
            font-family: 'Courier New', monospace;
            white-space: pre-wrap;
            min-height: 100px;
        }
        .error {
            border-left-color: #e74c3c;
            color: #e74c3c;
        }
        h1 {
            color: #007acc;
            margin-bottom: 5px;
        }
        .subtitle {
            color: #aaa;
            margin-bottom: 20px;
        }
        .examples {
            margin: 20px 0;
        }
        .example {
            background: #2d2d2d;
            padding: 10px;
            margin: 5px 0;
            cursor: pointer;
            border-radius: 4px;
            border: 1px solid #555;
        }
        .example:hover {
            background: #3d3d3d;
        }
        .example-title {
            color: #007acc;
            font-weight: bold;
        }
        .example-code {
            color: #aaa;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔥 CoRe Language WebAssembly Playground</h1>
        <p class="subtitle">Run CoRe Language programs directly in your browser!</p>

        <div class="examples">
            <h3>Try these examples:</h3>
            <div class="example" onclick="loadExample('hello')">
                <div class="example-title">Hello World</div>
                <div class="example-code">say: "Hello, CoRe WebAssembly!"</div>
            </div>
            <div class="example" onclick="loadExample('math')">
                <div class="example-title">Math Operations</div>
                <div class="example-code">x: 10; y: 5; say: x + y * 2</div>
            </div>
            <div class="example" onclick="loadExample('var')">
                <div class="example-title">Variables</div>
                <div class="example-code">name: "WebAssembly"; say: "Hello " + name</div>
            </div>
        </div>

        <textarea id="code-input" placeholder="Enter your CoRe code here...">say: "Hello, CoRe WebAssembly!"</textarea>

        <div>
            <button onclick="runCode()">▶️ Run Code</button>
            <button onclick="clearOutput()">🗑️ Clear Output</button>
        </div>

        <div id="output" class="output"></div>
    </div>

    <script type="module">
        import init, { compile_and_run } from './pkg/forge.js';

        let wasmModule = null;

        async function initWasm() {
            try {
                wasmModule = await init();
                document.getElementById('output').textContent = '✅ CoRe WebAssembly loaded successfully!\n\nReady to run CoRe programs. Try the examples above or write your own code.';
            } catch (error) {
                document.getElementById('output').textContent = '❌ Failed to load WebAssembly module: ' + error.message;
                document.getElementById('output').className = 'output error';
            }
        }

        window.runCode = function() {
            if (!wasmModule) {
                document.getElementById('output').textContent = '❌ WebAssembly module not loaded yet. Please wait...';
                document.getElementById('output').className = 'output error';
                return;
            }

            const code = document.getElementById('code-input').value;
            const outputDiv = document.getElementById('output');

            if (!code.trim()) {
                outputDiv.textContent = '⚠️ Please enter some CoRe code to run.';
                outputDiv.className = 'output error';
                return;
            }

            try {
                outputDiv.textContent = '🔄 Running...\n';
                outputDiv.className = 'output';

                const result = compile_and_run(code);
                outputDiv.textContent = '✅ Output:\n' + result;
            } catch (error) {
                outputDiv.textContent = '❌ Error:\n' + error.message;
                outputDiv.className = 'output error';
            }
        };

        window.clearOutput = function() {
            document.getElementById('output').textContent = '';
            document.getElementById('output').className = 'output';
        };

        window.loadExample = function(example) {
            const codeInput = document.getElementById('code-input');

            const examples = {
                hello: 'say: "Hello, CoRe WebAssembly!";',
                math: 'x: 10;\ny: 5;\nresult: x + y * 2;\nsay: "Result is " + result;',
                var: 'name: "WebAssembly";\nsay: "Hello " + name;'
            };

            if (examples[example]) {
                codeInput.value = examples[example];
            }
        };

        document.addEventListener('keydown', function(e) {
            if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                e.preventDefault();
                runCode();
            }
        });

        initWasm();
    </script>
</body>
</html>
